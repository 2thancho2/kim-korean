<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>😳김민종음 번역기🤯</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 50px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        .header-box { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        h1 { font-size: 24px; color: #333; margin: 0; }
        img { width: 100%; border-radius: 10px; margin-bottom: 20px; }
        
        /* 버튼 스타일 */
        .mode-btn { 
            padding: 10px 15px; border-radius: 8px; border: none; 
            background: #6366f1; color: white; font-weight: bold; 
            cursor: pointer; transition: 0.2s;
        }
        .mode-btn.reverse { background: #ec4899; }
        
        textarea { width: 100%; height: 100px; padding: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; resize: none; margin-bottom: 20px; }
        .output-box { min-height: 100px; padding: 15px; background: #eef2ff; border-radius: 10px; border: 1px solid #c7d2fe; word-break: break-all; font-size: 18px; font-weight: bold; color: #020715; white-space: pre-wrap; }
        label { font-weight: bold; display: block; margin-bottom: 8px; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1 id="title">😳김민종음 번역기😳</h1>
        <button id="modeToggle" class="mode-btn">해독 모드</button>
    </div>
    
    <img src="https://i.ibb.co/Q3b6KWzG/IMG-1714.avif">
    
    <label id="inputLabel">입력 (한국어)</label>
    <textarea id="input" placeholder="여기에 내용을 입력하세요..."></textarea>

    <label id="outputLabel">번역 결과 (김민종음)</label>
    <div id="output" class="output-box"></div>
</div>

<script>
    // 매핑 테이블
    const map_cho = [17, 9, 18, 0, 13, 2, 3, 5, 1, 6, 4, 7, 9, 8, 11, 12, 14, 15, 16];
    const map_jung = [18, 7, 20, 15, 0, 3, 2, 14, 13, 9, 5, 19, 12, 13, 11, 10, 16, 17, 18, 1, 17];
    const map_jong = [0, 26, 19, 10, 27, 5, 6, 7, 2, 8, 18, 3, 14, 12, 1, 15, 3, 5, 11, 6, 4, 7, 9, 11, 12, 14, 15, 16];

    // 역방향 매핑 테이블 생성
    const rev_cho = []; map_cho.forEach((v, i) => rev_cho[v] = i);
    const rev_jung = []; map_jung.forEach((v, i) => rev_jung[v] = i);
    const rev_jong = []; map_jong.forEach((v, i) => rev_jong[v] = i);

    let isReverse = false;
    const inputArea = document.getElementById('input');
    const outputDiv = document.getElementById('output');
    const modeBtn = document.getElementById('modeToggle');
    const title = document.getElementById('title');
    const inputLabel = document.getElementById('inputLabel');
    const outputLabel = document.getElementById('outputLabel');

    function processText() {
        const text = inputArea.value;
        let result = '';

        for (let i = 0; i < text.length; i++) {
            const charCode = text.charCodeAt(i);
            if (charCode >= 0xAC00 && charCode <= 0xD7A3) {
                const offset = charCode - 0xAC00;
                const cho = Math.floor(offset / 588);
                const jung = Math.floor((offset % 588) / 28);
                const jong = offset % 28;

                let n_cho, n_jung, n_jong;
                if (!isReverse) {
                    n_cho = map_cho[cho];
                    n_jung = map_jung[jung];
                    n_jong = jong === 0 ? 0 : map_jong[jong];
                } else {
                    n_cho = rev_cho[cho] ?? cho;
                    n_jung = rev_jung[jung] ?? jung;
                    n_jong = jong === 0 ? 0 : (rev_jong[jong] ?? jong);
                }

                result += String.fromCharCode((n_cho * 588) + (n_jung * 28) + n_jong + 0xAC00);
            } else {
                result += text[i];
            }
        }
        outputDiv.innerText = result;
    }

    modeBtn.addEventListener('click', () => {
        isReverse = !isReverse;
        modeBtn.classList.toggle('reverse');
        modeBtn.innerText = isReverse ? "번역 모드로" : "해독 모드로";
        title.innerText = isReverse ? "🤯김민종음 해독기🤯" : "😳김민종음 번역기😳";
        inputLabel.innerText = isReverse ? "입력 (김민종음)" : "입력 (한국어)";
        outputLabel.innerText = isReverse ? "해독 결과 (한국어)" : "번역 결과 (김민종음)";
        processText();
    });

    inputArea.addEventListener('input', processText);
</script>

</body>
</html>
